<!DOCTYPE html>
<html>
<head>
    <title>Chat | Roommate Finder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadTheme(); loadMessages()">

    <h1>Chat & Messaging 💬</h1>

    <div class="profile-container">

        <div class="card">
            <div class="chat-header">
                <h3>Roommate Chat</h3>
                <p>Talk with other users</p>
            </div>

            <div id="chatBox" class="chat-box"></div>

            <div class="chat-input-row">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleMessageKey(event)">
                <button class="center-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <button class="center-btn" onclick="goToHome()">🏠 Back to PG Listings</button>
        <button class="center-btn" onclick="toggleTheme()">🌙 Toggle Theme</button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
