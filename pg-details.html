<!DOCTYPE html>
<html>
<head>
    <title>PG Details</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadDetails(); loadTheme(); loadPGMessages()"></body>
<h1>PG Details 🏠</h1>

<div class="profile-container">

    <!-- BACK BUTTON -->
    <div style="text-align:center;">
        <button class="main-btn" onclick="goToHome()">⬅ Back</button>
    </div>

    <!-- DETAILS -->
    <div id="details" class="card"></div>

    <div class="card">
    <h3>Chat with Owner 💬</h3>
    <div id="pgChatBox" class="chat-box"></div>

    <div class="chat-input-row">
        <input type="text" id="pgMessageInput" placeholder="Type your message..." onkeypress="handlePGMessageKey(event)">
        <button class="center-btn" onclick="sendPGMessage()">Send</button>
    </div>
    
</div>

</div>

<!-- Firebase (optional here, but safe to include) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Main Script -->
<script src="script.js"></script>

</body>
</html>
